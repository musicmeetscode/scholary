<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Icon tile -->
  <rect x="0" y="2" width="52" height="52" rx="14" fill="url(#iconGrad)"/>
  <!-- Gloss overlay -->
  <rect x="0" y="2" width="52" height="26" rx="14" fill="url(#shineGrad)"/>

  <!-- Graduation cap board (diamond) -->
  <polygon points="26,12 44,21 26,30 8,21" fill="white" opacity="0.97"/>

  <!-- Cap body below the board -->
  <rect x="18" y="30" width="16" height="12" rx="3" fill="white" opacity="0.88"/>

  <!-- Tassel cord from right corner -->
  <line x1="44" y1="21" x2="44" y2="37" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel knot -->
  <circle cx="44" cy="39" r="3" fill="white" opacity="0.9"/>

  <!-- Wordmark: "Scholary" -->
  <text
    x="66" y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="-0.6"
    fill="#0f172a"
  >Scholary</text>
</svg>
